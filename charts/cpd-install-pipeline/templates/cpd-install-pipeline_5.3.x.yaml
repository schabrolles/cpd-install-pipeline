{{- if semverCompare "~5.3.0" .Values.cpd_version }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  {{- if .Values.airgap.enabled }}
  name: cpd-install-airgap
  {{- else }}
  name: cpd-install
  {{- end }}
  namespace: {{ .Release.Namespace }}
spec:
  params:
    {{- if .Values.airgap.enabled }}
    - default: {{ .Values.airgap.image_pull_prefix }}
      description: The location from which your cluster pulls images (IMAGE_PULL_PREFIX/cpopen).
      name: IMAGE_PULL_PREFIX
      type: "string"
    - default: {{ .Values.airgap.private_registry_secret }}
      description: registry-secret containing your private registry credential
      name: PRIVATE_REGISTRY_SECRET
      type: string
    {{- end }}
    - default: {{ .Values.default_olm_utils_image }}
      description: olm-utils images
      name: OLM_UTILS_IMAGE
      type: string
    - default: {{ .Values.cpd_version }}
      description: cloud-pak for data version
      name: VERSION
      type: string
    {{- if eq .Values.default_cpd_install "watsonx" }}
    - default: watsonx_orchestrate
    {{- else }}
    - default: wml,ws
    {{- end }}
      description: "cloud-pak components to install (wml,watsonx_ai,watsonx_orchestrate,watsonx_data,watsonx_governance,...)https://www.ibm.com/docs/en/software-hub/5.3.x?topic=information-determining-which-components-install"
      name: COMPONENTS
      type: string
    - default: "{{ .Release.Name }}-install-option"
      description: configMap which contains cloud pak install-options (EDIT THIS CONFIGMAP TO CUSTOMIZE YOUR COMPONENTS INSTALLATION BEFORE STARTING THE PIPELINE)"
      name: CP-INSTALL-OPTIONS
      type: string
    - default: "true"
      description: Install needed prerequisite (like OpenshiftAI, knative, mcg ...) https://www.ibm.com/docs/en/software-hub/5.3.x?topic=cluster-installing-prerequisite-software
      name: INSTALL_PREREQUISITE
      type: string
    {{- if eq .Values.default_cpd_install "watsonx" }}
    - default: watsonx
    {{- else }}
    - default: cpd
    {{- end }}
      description: cloud-pak operand namspace
      name: PROJECT_CPD_INST_OPERANDS
      type: string
    {{- if eq .Values.default_cpd_install "watsonx" }}
    - default: watsonx-operators
    {{- else }}
    - default: cpd-operators
    {{- end }}
      description: cloud-pak operators namspace
      name: PROJECT_CPD_INST_OPERATORS
      type: string
    - default: ibm-licensing
      description: cloud-pak ibm-licensing namespace
      name: PROJECT_LICENSE_SERVICE
      type: string
    - default: "false"
      description: Set [true] to enable ibm-scheduler
      name: SCHEDULER
      type: string
      {{- if .Values.tektonPatch.activateEnum }}
      enum: ["true", "false"]
      {{- end }}
    - default: ibm-scheduler
      description: cloud-pak scheduler namespace
      name: PROJECT_SCHEDULING_SERVICE
      type: string
    {{- if not .Values.airgap.enabled }}
    - name: IBM_ENTITLEMENT_KEY
      description: your ICR key to access cp.icr.io
      type: string
    {{- end }}
    - default: {{ .Values.storageClass.block }}
      description: StorageClass for Block
      name: STG_CLASS_BLOCK
      type: string
    - default: {{ .Values.storageClass.file }}
      description: StorageClass for Files
      name: STG_CLASS_FILE
      type: string
    - name: GPU_OPERATOR_INSTALL
      description: "Install GPU Operator with requirement like NFD operator"
      type: string
      default: "false"
    - name: GPU_OPERATOR_CHANNEL
      description: "GPU Operator channel version"
      type: string
      default: "v25.3"
    {{- if eq .Values.default_cpd_install "watsonx" }}
    - default: "watsonx-ai,watsonx-orchestrate,watsonx-data"
      description: "Entitlement: watsonx-ai,watsonx-orchestrate,watsonx-data,watsonx-data,watsonx-gov-mm,watsonx-gov-rc...https://www.ibm.com/docs/en/software-hub/5.3.x?topic=entitlements-applying-your-without-node-pinning"
    {{- else }}
    - default: cpd-enterprise
      description: "Entitlement: cpd-enterprise,cpd-standard...https://www.ibm.com/docs/en/software-hub/5.3.x?topic=entitlements-applying-your-without-node-pinning"
    {{- end }}
      name: ENTITLEMENT
      type: string
      {{- if .Values.tektonPatch.activateEnum }}
      enum: ["cpd-enterprise", "cpd-standard", "watsonx-ai", "watsonx-data", "watsonx-gov-rc", "watsonx-gov-mm"]
      {{- end }}
    - name: ACCEPT_LICENCE
      description: 'Please Accept LICENCE (set [true])'
      type: string
      {{- if .Values.tektonPatch.activateEnum }}
      enum: ["true", "false"]
      {{- end }} 
    - default: "true"
      description: 'Set [false] for non-prod environment'
      name: PRODUCTION
      type: string
      {{- if .Values.tektonPatch.activateEnum }}
      enum: ["true", "false"]
      {{- end }} 
    - name: APPLY_MACHINECONFIG
      description: Apply KubeletConfig for cloud-pak-for-data (PidsLimit)
      type: string
      default: "false"
      {{- if .Values.tektonPatch.activateEnum }}
      enum: ["true", "false"]
      {{- end }} 
    - name: DB2_LIMITED_PRIV
      description: Run DB2 pod in Limited Privilege mode
      type: string
      default: "false"
      {{- if .Values.tektonPatch.activateEnum }}
      enum: ["true", "false"]
      {{- end }}
    - name: CASE_FROM_OCI
      description: Set [true] to download CASE as OCI, [false] to get CASE from Github.
      type: string
      {{ if .Values.proxy.enabled }}default: "false"{{ else }}default: "true"{{ end }}
      {{- if .Values.tektonPatch.activateEnum }}
      enum: ["true", "false"]
      {{- end }}
    # - {{ if .Values.airgap.enabled }}default: {{ .Values.airgap.oci_location }}{{ else }}default: "cp.icr.io/cpopen"{{ end }}
    #   description: only if CASE_FROM_OCI=true, set the registry URL from which you want to download CASE packages
    #   name: OCI_LOCATION
    #   type: "string"
    {{- if .Values.airgap.enabled }}
    - default: {{ .Values.airgap.oci_location }}
      description: only if CASE_FROM_OCI=true, set the registry URL from which you want to download CASE packages
      name: OCI_LOCATION
      type: "string"
    {{- end }}
  tasks:
  - name: check-prereq
    params:
    - name: COMPONENTS
      value: $(params.COMPONENTS)
    taskSpec:
      metadata: {}
      results:
      - name: openshift-ai
        type: string
      - name: mcg
        type: string
      - name: cert-manager
        type: string
      - name: ibm-events-operator
        type: string
      - name: cert-manager
        type: string
      - name: gpu-operator
        type: string
      spec: null
      steps:
      - computeResources: {}
        image: $(params.OLM_UTILS_IMAGE):$(params.VERSION)
        name: check-cert-manager
        script: |
          # Test if cert-manager is already present
          RC=0
          cat <<EOF |oc apply -f - || RC=1
          apiVersion: cert-manager.io/v1
          kind: Issuer
          metadata:
            name: test-selfsigned
            namespace: {{ .Release.Namespace }}
          spec:
            selfSigned: {}
          ---
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: selfsigned-cert
            namespace: {{ .Release.Namespace }}
          spec:
            commonName: test.example.com
            dnsNames:
            - test.example.com
            secretName: selfsigned-cert-tls
            issuerRef:
              name: test-selfsigned
          EOF
          
          if [ $RC -ne 0 ]; then
            echo "Trigger cert-manager installation"
            echo 
            echo -n "true" > $(results.cert-manager.path)
          else
            echo "> Waiting for certificate to be ready"
            oc wait --for=condition=Ready=true certificate.cert-manager.io/selfsigned-cert -n {{ .Release.Namespace }}
            if [ $? -ne 0 ]; then
              oc delete issuers.cert-manager.io -n {{ .Release.Namespace }} test-selfsigned --ignore-not-found
              oc delete certificate.cert-manager.io -n {{ .Release.Namespace }} selfsigned-cert --ignore-not-found
              oc delete secrets selfsigned-cert-tls -n {{ .Release.Namespace }} --ignore-not-found
              echo "Trigger cert-manager installation"
              echo
              echo -n "true" > $(results.cert-manager.path)
            else
              echo "cert-manager is already present"
              echo
            fi
          fi
        volumeMounts:
          - name: "install-options"
            mountPath: /tmp/install-options/install-options.yml
            subPath: install-options.yml
          {{ if .Values.airgap.enabled }}
          - name: "airgap-secret"
            mountPath: /opt/ansible/{{ .Values.airgap.private_registry_secret }}.json
            subPath: .dockerconfigjson
          {{ end }}
      - computeResources: {}
        image: $(params.OLM_UTILS_IMAGE):$(params.VERSION)
        name: check-components-prereq
        script: |
          COMPONENTS=$(params.COMPONENTS)

          if [[ ",$COMPONENTS," == *",watsonx_ai,"* ]]; then
            echo "watsonx_ai requested"
            echo -n "true" > $(results.gpu-operator.path)
            echo " => Setup GPU Operator"
            echo -n "true" > $(results.openshift-ai.path)
            echo " => Setup OpenShift AI"
          fi

          if [[ ",$COMPONENTS," == *",watsonx_orchestrate,"* ]]; then
            echo "watsonx_orchestrate requested"

            # Verify if watsonx_ai is requested in watsonx_orchestrate install-options
            if [ $(yq 'select(.non_olm.watsonxOrchestrate != null) | .non_olm.watsonxOrchestrate.watsonxAI.watsonxaiifm' /tmp/install-options/install-options.yml) = "true" ]; then
              echo -n "true" > $(results.gpu-operator.path)
              echo " => Setup GPU Operator"
              echo -n "true" > $(results.openshift-ai.path)
              echo " => Setup OpenShift AI"
            fi
            # Verify if knative_eventing is requested in watsonx_orchestrate install-options (mode agentic_assistant or agentic_skills_assistant)
            
            if [ $(yq 'select(.non_olm.watsonxOrchestrate != null) | .non_olm.watsonxOrchestrate.installMode' /tmp/install-options/install-options.yml) = "agentic_assistant" ] || [ $(yq 'select(.non_olm.watsonxOrchestrate != null) | .non_olm.watsonxOrchestrate.installMode' /tmp/install-options/install-options.yml) = "agentic_skills_assistant" ]; then
              echo -n "true" > $(results.ibm-events-operator.path) 
              echo " => Setup Knative Eventing"
            fi

            echo -n "true" > $(results.mcg.path)
            echo " => Setup MultiCloud Gateway"

          fi

          if [[ ",$COMPONENTS," == *",watsonx_data,"* ]]; then
            echo "watsonx_data requested"
            echo -n "true" > $(results.gpu-operator.path)
            echo " => Setup GPU Operator"
          fi

          if [[ ",$COMPONENTS," == *",ikc_standard,"* ]]; then
            echo "ikc_standard requested"
            echo -n "true" > $(results.gpu-operator.path)
            echo " => Setup GPU OPERATOR"
            echo -n "true" > $(results.openshift-ai.path)
            echo " => Setup OpenShift AI"

          fi

          if [[ ",$COMPONENTS," == *",ikc_premium,"* ]]; then 
            echo "ikc_premium requested"
            echo -n "true" > $(results.gpu-operator.path)
            echo " => Setup GPU OPERATOR"
            echo -n "true" > $(results.openshift-ai.path)
            echo " => Setup OpenShift AI"
          fi

          if [[ ",$COMPONENTS," == *",wml,"* ]]; then
            echo "wml requested"
            echo -n "true" > $(results.gpu-operator.path)
            echo " => Setup GPU OPERATOR"
          fi

          if [[ ",$COMPONENTS," == *",watson_speech,"* ]]; then
            echo "watson_speech requested" 
            echo -n "true" > $(results.gpu-operator.path)
            echo " => Setup GPU OPERATOR"
            echo -n "true" > $(results.openshift-ai.path)
            echo " => Setup OpenShift AI"
            echo -n "true" > $(results.mcg.path) 
            echo " => Setup MultiCloud Gateway"
          fi

          if [[ ",$COMPONENTS," == *",watson_assistant,"* ]]; then 
            echo "watson_assistant requested"
            echo -n "true" > $(results.gpu-operator.path)
            echo " => Setup GPU OPERATOR"
            echo -n "true" > $(results.openshift-ai.path)
            echo " => Setup OpenShift AI"
          fi
          
          if [[ ",$COMPONENTS," == *",watson_bi_assistant,"* ]]; then 
            echo "watson_bi_assistant requested" 
            echo -n "true" > $(results.gpu-operator.path)
            echo " => Setup GPU OPERATOR"
            echo -n "true" > $(results.openshift-ai.path)
            echo " => Setup OpenShift AI"
          fi

          if [[ ",$COMPONENTS," == *",wca"* ]]; then 
            echo "wca requested" 
            echo -n "true" > $(results.gpu-operator.path)
            echo " => Setup GPU OPERATOR"
            echo -n "true" > $(results.openshift-ai.path)
            echo " => Setup OpenShift AI"
            echo -n "true" > $(results.mcg.path)
            echo " => Setup MultiCloud Gateway"
            echo -n "true" > $(results.ibm-events-operator.path)
            echo " => Setup Knative Eventing"
          fi

          if [[ ",$COMPONENTS," == *",watsonx_data_premium,"* ]]; then
            echo "watsonx_data_premium requested" 
            echo -n "true" > $(results.openshift-ai.path)
            echo " => Setup OpenShift AI"
          fi

          if [[ ",$COMPONENTS," == *",watsonx_dataintelligence,"* ]]; then 
            echo "watsonx_dataintelligence requested" 
            echo -n "true" > $(results.openshift-ai.path)
            echo " => Setup OpenShift AI"
          fi

          if [[ ",$COMPONENTS," == *",watson_discovery,"* ]]; then
            echo -n "true" > $(results.mcg.path)
            echo " => Setup MultiCloud Gateway"
          fi
        volumeMounts:
          - name: "install-options"
            mountPath: /tmp/install-options/install-options.yml
            subPath: install-options.yml
          {{ if .Values.airgap.enabled }}
          - name: "airgap-secret"
            mountPath: /opt/ansible/{{ .Values.airgap.private_registry_secret }}.json
            subPath: .dockerconfigjson
          {{ end }}
      volumes:
        - name: "install-options"
          configMap:
            name: "$(params.CP-INSTALL-OPTIONS)"
        {{ if .Values.airgap.enabled }}
        - name: "airgap-secret"
          secret:
            secretName: "$(params.PRIVATE_REGISTRY_SECRET)"
        {{ end  }}
  - name: update-global-pull-secret
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    - name: OLM_CMD
      value: |-
        {{- if .Values.airgap.enabled }}
        mkdir -p pull-secret && \
        oc extract secret/pull-secret -n openshift-config --to=pull-secret && \
        mkdir -p {{ .Values.airgap.private_registry_secret }} && \
        oc extract secret/$(params.PRIVATE_REGISTRY_SECRET) -n {{ .Release.Namespace }} --to={{ .Values.airgap.private_registry_secret }} && \
        jq -s '.[0] * .[1]' pull-secret/.dockerconfigjson {{ .Values.airgap.private_registry_secret }}/.dockerconfigjson > .dockerconfigjson && \
        oc set data secret/pull-secret -n openshift-config --from-file=.dockerconfigjson
        {{- else }}
        add-icr-cred-to-global-pull-secret --entitled_registry_key=$(params.IBM_ENTITLEMENT_KEY)
        {{- end }}

        if [[ $(oc get mcp -o name | wc -l) -eq 0 ]]; then
          platformSpec=$(oc get Infrastructure/cluster -o jsonpath='{.spec.platformSpec.type}')
          echo
          echo "non-MCP cluster detected, activating workaround"
          case $platformSpec in 
            KubeVirt )
              echo "KubeVirt detected, activating workaround"
              echo
              dockerconfigfile=/var/lib/kubelet/config.json
            ;;
            IBMCloud )
              echo "ROKS detected, activating workaround"
              echo
              dockerconfigfile=/.docker/config.json
            ;;
            *)
              echo "Unknown platform detected, activating workaround, † cross your fingers †"
              echo
              dockerconfigfile=/var/lib/kubelet/config.json
            ;;
          esac
          oc debug $(oc get node -o name | head -n1) -- chroot /host cat $dockerconfigfile > /tmp/config.json

          {{ if not .Values.airgap.enabled }}
          cat /tmp/config.json | jq --arg auth cp:$(params.IBM_ENTITLEMENT_KEY) '.auths += {"cp.icr.io": {"auth": $auth|@base64}}' > /tmp/config.json.new
          {{ else }}
          oc extract secret/$(params.PRIVATE_REGISTRY_SECRET) -n {{ .Release.Namespace }} --to=/tmp
          jq -s '.[0] * .[1]' /tmp/config.json /tmp/.dockerconfigjson > /tmp/config.json.new
          {{ end }}

          sleep 1
          for n in `oc get node -o name`; do 
            oc adm copy-to-node --copy=/tmp/config.json.new=$dockerconfigfile $n
          done
        fi
    taskRef:
      kind: Task
      name: olm-utils
  - name: kubelet-pod-pids-limit
    retries: 10
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    - name: OLM_CMD
      value: |-
        if [[ $(oc get mcp -o name | wc -l) -gt 0 ]]; then
          apply-pid-limit
        else
          echo "No MachineConfig Found"
        fi
    taskRef:
      kind: Task
      name: olm-utils
    when:
    - input: $(params.APPLY_MACHINECONFIG)
      operator: in
      values:
      - "true"
      - "yes"
  - name: kubelet-db2-limited-priv
    retries: 10
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    - name: OLM_CMD
      value: |-
        if [[ $(oc get mcp -o name | wc -l) -gt 0 ]]; then
          apply-db2-kubelet --self_managed=true
        else
          echo "No MachineConfig Found ..."
          platformSpec=$(oc get Infrastructure/cluster -o jsonpath='{.spec.platformSpec.type}')

          case $platformSpec in 
            IBMCloud)
              echo "\nIBMCloud ROKS detected"
              apply-db2-kubelet --openshift_type=roks

              echo "* [Applying kubelet config without reboot]"
              echo "* Fetching cp4d-kubelet.conf"
              oc extract cm/cp4d-kubelet-conf -n kube-system --to=/tmp

              echo "* Deploying new kebelet"
              for n in `oc get node -o name`; do 
                oc adm copy-to-node --copy=/tmp/cp4d-kubelet.conf=/etc/kubernetes/kubelet.conf $n
              done

              echo "* Restarting kubelet"
              oc adm restart-kubelet nodes --all --directive=RemoveKubeletKubeconfig
            ;;
            *)
              echo "Can't detect CloudProvider. Don't know how to apply configuration"
            ;;
          esac
        fi
    taskRef:
      kind: Task
      name: olm-utils
    when:
    - input: $(params.DB2_LIMITED_PRIV)
      operator: in
      values:
      - "true"
      - "yes"
  - name: wait-for-mcp
    retries: 10
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    - name: OLM_CMD
      value: |-
        if [[ $(oc get mcp -o name | wc -l) -gt 0 ]]; then
          echo "Waiting for all MachineConfigPools to be ready..."
          COUNT=0 
          until [[ $COUNT -ge 3 ]]; do
            for mcp in $(oc get mcp -o name); do
              echo "Waiting for $mcp to be updated and ready..."
              oc wait --for=condition=Updated=True $mcp --timeout=30m
            done
            COUNT=$((COUNT+1))
            echo "NO MCP running. COUNT $COUNT/3"
            echo
            sleep 10
          done
          echo "All MachineConfigPools are ready"
        else
          echo "No MachineConfigPools found, skipping wait"
        fi
    taskRef:
      kind: Task
      name: olm-utils
    runAfter:
    - check-prereq
    - update-global-pull-secret
    - kubelet-pod-pids-limit
    - kubelet-db2-limited-priv
  - name: nfd-operator
    retries: 3
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: OLM_CMD
      value: |
        echo
        echo "> Check if Node Feature Discovery Operator is already installed"
        if oc get subscriptions.operators.coreos.com nfd -n openshift-nfd &>/dev/null; then
          echo "> NFD operator already installed, skipping operator installation"
        else
          echo "> Deploy Node Feature Discovery Operator"
          cat <<EOF |oc apply -f -
        apiVersion: v1
        kind: Namespace
        metadata:
          name: openshift-nfd
        ---
        apiVersion: operators.coreos.com/v1
        kind: OperatorGroup
        metadata:
          name: nfd-operator
          namespace: openshift-nfd
        spec:
          targetNamespaces:
          - openshift-nfd
          upgradeStrategy: Default
        ---
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: nfd
          namespace: openshift-nfd
        spec:
          channel: stable
          installPlanApproval: Automatic
          name: nfd
          source: redhat-operators
          sourceNamespace: openshift-marketplace
        EOF

          ###
          echo
          echo "> Wait for CSV nfd-operator to be Available ..."
          until oc get csv -n openshift-nfd 2>/dev/null | grep -q nfd; do
            echo -n "."
            sleep 2
          done
          echo
          echo "> Wait for InstallPlan to Complete"
          oc wait --for jsonpath='{.status.phase}'="Complete" installplans.operators.coreos.com --all -n openshift-nfd
          echo "> Wait for Operator Pods to be Ready"
          oc wait --for=condition=Ready=true pod --all -n openshift-nfd
        fi

        echo
        echo "> Check if NodeFeatureDiscovery instance already exists"
        if oc get nodefeaturediscovery nfd-instance -n openshift-nfd &>/dev/null; then
          echo "> NodeFeatureDiscovery nfd-instance already exists, skipping creation"
        else
          echo "> Create nfd-instance"
          cat <<EOF |oc apply -f -
        apiVersion: nfd.openshift.io/v1
        kind: NodeFeatureDiscovery
        metadata:
          name: nfd-instance
          namespace: openshift-nfd
        spec:
          enableTaints: false
          instance: ''
          operand:
            imagePullPolicy: IfNotPresent
            servicePort: 12000
          prunerOnDelete: false
          topologyUpdater: false
          workerConfig:
            configData: |
              core:
                sleepInterval: 60s
              sources:
                pci:
                  deviceClassWhitelist:
                    - "0200"
                    - "03"
                    - "12"
                  deviceLabelFields:
                    - "vendor"
        EOF
        fi
    - name: CP-INSTALL-OPTIONS
      value: cpd-install-pipeline-install-option
    - name: PRIVATE_REGISTRY_SECRET
      value: private-registry-secret
    runAfter:
    - wait-for-mcp
    taskRef:
      kind: Task
      name: olm-utils
    when:
    - input: $(params.GPU_OPERATOR_INSTALL)
      operator: in
      values:
      - 'true'
  - name: gpu-operaor
    retries: 3
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: OLM_CMD
      value: |
        CHANNEL_VERSION=$(params.GPU_OPERATOR_CHANNEL)

        if [ -z $CHANNEL_VERSION ]; then
          echo "CHANNEL_VERSION variable for NVIDIA GPU Operator not set"
        fi

        echo
        echo "> Check if NVIDIA GPU Operator is already installed"
        if oc get subscriptions.operators.coreos.com gpu-operator-certified -n nvidia-gpu-operator &>/dev/null; then
          echo "> NVIDIA GPU Operator already installed, skipping operator installation"
        else
          echo "> Deploy NVIDIA GPU Operator"
          cat <<EOF |oc apply -f -
        apiVersion: v1
        kind: Namespace
        metadata:
          name: nvidia-gpu-operator
        ---
        apiVersion: operators.coreos.com/v1
        kind: OperatorGroup
        metadata:
          name: nvidia-gpu-operator
          namespace: nvidia-gpu-operator
        spec:
          targetNamespaces:
          - nvidia-gpu-operator
          upgradeStrategy: Default
        ---
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: gpu-operator-certified
          namespace: nvidia-gpu-operator
        spec:
          channel: $CHANNEL_VERSION
          installPlanApproval: Automatic
          name: gpu-operator-certified
          source: certified-operators
          sourceNamespace: openshift-marketplace
        EOF

          ###
          echo
          echo "> Wait for CSV nvidia-gpu-operator to be Available ..."
          until oc get csv -n nvidia-gpu-operator 2>/dev/null | grep -q gpu-operator-certified; do
            echo -n "."
            sleep 2
          done
          echo
          echo "> Wait for InstallPlan to Complete"
          oc wait --for jsonpath='{.status.phase}'="Complete" installplans.operators.coreos.com --all -n nvidia-gpu-operator
          echo "> Wait for Operator Pods to be Ready"
          oc wait --for=condition=Ready=true pod --all -n nvidia-gpu-operator
        fi

        echo
        echo "> Check if ClusterPolicy already exists"
        if oc get clusterpolicy gpu-cluster-policy &>/dev/null; then
          echo "> ClusterPolicy gpu-cluster-policy already exists, skipping creation"
        else
          echo "> Create gpu-cluster-policy"
          cat <<EOF |oc apply -f -
        apiVersion: nvidia.com/v1
        kind: ClusterPolicy
        metadata:
          name: gpu-cluster-policy
        spec:
          vgpuDeviceManager:
            config:
              default: default
            enabled: true
          migManager:
            config:
              default: all-disabled
              name: default-mig-parted-config
            enabled: true
          operator:
            defaultRuntime: crio
            initContainer: {}
            runtimeClass: nvidia
            use_ocp_driver_toolkit: true
          dcgm:
            enabled: true
          gfd:
            enabled: true
          dcgmExporter:
            config:
              name: ''
            enabled: true
            serviceMonitor:
              enabled: true
          cdi:
            default: false
            enabled: false
          driver:
            licensingConfig:
              configMapName: ''
              nlsEnabled: true
            enabled: true
            kernelModuleType: auto
            certConfig:
              name: ''
            useNvidiaDriverCRD: false
            kernelModuleConfig:
              name: ''
            upgradePolicy:
              autoUpgrade: true
              drain:
                deleteEmptyDir: false
                enable: false
                force: false
                timeoutSeconds: 300
              maxParallelUpgrades: 1
              maxUnavailable: 25%
              podDeletion:
                deleteEmptyDir: false
                force: false
                timeoutSeconds: 300
              waitForCompletion:
                timeoutSeconds: 0
            repoConfig:
              configMapName: ''
            virtualTopology:
              config: ''
          devicePlugin:
            config:
              default: ''
              name: ''
            enabled: true
            mps:
              root: /run/nvidia/mps
          gdrcopy:
            enabled: false
          kataManager:
            config:
              artifactsDir: /opt/nvidia-gpu-operator/artifacts/runtimeclasses
          mig:
            strategy: single
          sandboxDevicePlugin:
            enabled: true
          validator:
            plugin:
              env: []
          nodeStatusExporter:
            enabled: true
          daemonsets:
            rollingUpdate:
              maxUnavailable: '1'
            updateStrategy: RollingUpdate
          sandboxWorkloads:
            defaultWorkload: container
            enabled: false
          gds:
            enabled: false
          vgpuManager:
            enabled: false
          vfioManager:
            enabled: true
          toolkit:
            enabled: true
            installDir: /usr/local/nvidia
        EOF
        fi
    - name: CP-INSTALL-OPTIONS
      value: cpd-install-pipeline-install-option
    - name: PRIVATE_REGISTRY_SECRET
      value: private-registry-secret
    runAfter:
    - nfd-operator
    taskRef:
      kind: Task
      name: olm-utils
    when:
    - input: $(params.GPU_OPERATOR_INSTALL)
      operator: in
      values:
      - 'true'
  - name: openshift-ai
    retries: 3
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: OLM_CMD
      value: |
        CHANNEL_VERSION=stable-2.25

        if [ -z $CHANNEL_VERSION ]; then
          echo "CHANNEL_VERSION variable for Openshift AI Operator not set"
        fi

        echo
        echo "> Check if OpenShift AI Operator is already installed"
        if oc get subscriptions.operators.coreos.com rhods-operator -n redhat-ods-operator &>/dev/null; then
          echo "> OpenShift AI operator already installed, skipping operator installation"
        else
          echo "> Deploy Openshift AI Operator ($CHANNEL_VERSION)"
          cat <<EOF |oc apply -f -
        apiVersion: v1
        kind: Namespace
        metadata:
          name: redhat-ods-operator
        ---
        apiVersion: operators.coreos.com/v1
        kind: OperatorGroup
        metadata:
          name: rhods-operator
          namespace: redhat-ods-operator
        ---
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: rhods-operator
          namespace: redhat-ods-operator
        spec:
          name: rhods-operator
          channel: ${CHANNEL_VERSION}
          source: redhat-operators
          sourceNamespace: openshift-marketplace
          config:
            env:
                - name: "DISABLE_DSC_CONFIG"
        EOF

          ###
          echo
          echo "> Wait for CSV rhods-operator to be Available ..."
          until oc get csv -n redhat-ods-operator 2>/dev/null | grep -q rhods-operator; do
            echo -n "."
            sleep 2
          done
          echo
          echo "> Wait for InstallPlan to Complete"
          oc wait --for jsonpath='{.status.phase}'="Complete" installplans.operators.coreos.com --all -n redhat-ods-operator
          echo "> Wait for Operator Pods to be Ready"
          oc wait --for=condition=Ready=true pod --all -n redhat-ods-operator
        fi

        ###
        echo
        echo "> Check if DSCInitialization already exists"
        if oc get dscinitialization default-dsci &>/dev/null; then
          echo "> DSCInitialization default-dsci already exists, skipping creation"
        else
          cat <<EOF |oc apply -f -
        apiVersion: dscinitialization.opendatahub.io/v1
        kind: DSCInitialization
        metadata:
          name: default-dsci
        spec:
          applicationsNamespace: redhat-ods-applications
          monitoring:
            managementState: Managed
            namespace: redhat-ods-monitoring
          serviceMesh:
            managementState: Removed
          trustedCABundle:
            managementState: Managed
            customCABundle: ""
        EOF

          echo
          echo "> Wait for default-dsci to be Ready ..."
          oc wait --for jsonpath='{.status.phase}'="Ready" dscinitialization default-dsci
        fi

        ###
        echo
        echo "> Check if DataScienceCluster already exists"
        if oc get datasciencecluster default-dsc &>/dev/null; then
          echo "> DataScienceCluster default-dsc already exists, skipping creation"
        else
          cat <<EOF |oc apply -f -
        apiVersion: datasciencecluster.opendatahub.io/v1
        kind: DataScienceCluster
        metadata:
          name: default-dsc
        spec:
          components:
            codeflare:
              managementState: Removed
            dashboard:
              managementState: Removed
            datasciencepipelines:
              managementState: Removed
            kserve:
              managementState: Managed
              defaultDeploymentMode: RawDeployment
              serving:
                managementState: Removed
                name: knative-serving
            kueue:
              managementState: Removed
            modelmeshserving:
              managementState: Removed
            ray:
              managementState: Removed
            trainingoperator:
              managementState: Managed
            trustyai:
              managementState: Removed
            workbenches:
              managementState: Removed
        EOF

          echo
          echo "> Wait for default-dsc to be Ready ..."
          oc wait --for jsonpath='{.status.phase}'="Ready" datasciencecluster default-dsc --timeout 5m
        fi

        ###
        echo
        echo "> Patch inferenceservice-config CM"

        oc patch cm inferenceservice-config -n redhat-ods-applications -p '{"metadata":{"annotations":{"opendatahub.io/managed":"false"}}}'
        sleep 1
        oc get configmap inferenceservice-config -n redhat-ods-applications -o yaml | yq '.data.ingress |= (from_json | .domainTemplate = "example.com" | to_json | . style="literal")' | oc replace -f -
    - name: CP-INSTALL-OPTIONS
      value: cpd-install-pipeline-install-option
    - name: PRIVATE_REGISTRY_SECRET
      value: private-registry-secret
    runAfter:
    - gpu-operaor
    taskRef:
      kind: Task
      name: olm-utils
    when:
    - input: $(tasks.check-prereq.results.openshift-ai)
      operator: in
      values:
      - 'true'
    - input: $(params.INSTALL_PREREQUISITE)
      operator: in
      values:
      - 'true'
  - name: setup-mcg
    retries: 3
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: OLM_CMD
      value: |
        echo "ODF Mutlicloud Gateway setup"
        export NOOBAA_ACCOUNT_CREDENTIALS_SECRET=noobaa-admin
        export NOOBAA_ACCOUNT_CERTIFICATE_SECRET=noobaa-s3-serving-cert

        COMPONENTS=$(params.COMPONENTS)

        if [[ ",$COMPONENTS," == *",watson_discovery,"* ]]; then
          echo
          echo "watson_discovery detected"
          setup-mcg --components=watson_discovery --cpd_instance_ns=$(params.PROJECT_CPD_INST_OPERANDS)} --noobaa_account_secret=${NOOBAA_ACCOUNT_CREDENTIALS_SECRET}
          oc get secrets --namespace=$(params.PROJECT_CPD_INST_OPERANDS) noobaa-account-watson-discovery
        fi

        if [[ ",$COMPONENTS," == *",watson_speech,"* ]]; then
          echo
          echo "watson_speech detected"
          setup-mcg --components=watson_speech --cpd_instance_ns=$(params.PROJECT_CPD_INST_OPERANDS) --noobaa_account_secret=${NOOBAA_ACCOUNT_CREDENTIALS_SECRET}  --noobaa_cert_secret=${NOOBAA_ACCOUNT_CERTIFICATE_SECRET}
          oc get secrets --namespace=$(params.PROJECT_CPD_INST_OPERANDS) noobaa-account-watson-speech
        fi

        if [[ ",$COMPONENTS," == *",watson_assistant,"* ]]; then
          echo
          echo "watson_assistant detected"
          setup-mcg --components=watson_assistant --cpd_instance_ns=$(params.PROJECT_CPD_INST_OPERANDS) --noobaa_account_secret=${NOOBAA_ACCOUNT_CREDENTIALS_SECRET} --noobaa_cert_secret=${NOOBAA_ACCOUNT_CERTIFICATE_SECRET}
          oc get secrets --namespace=$(params.PROJECT_CPD_INST_OPERANDS) noobaa-account-watson-assistant noobaa-cert-watson-assistant noobaa-uri-watson-assistant
        fi

        if [[ ",$COMPONENTS," == *",watsonx_orchestrate,"* ]]; then
         echo
          echo "watsonx_orchestrate detected"
          setup-mcg --components=watson_assistant --cpd_instance_ns=$(params.PROJECT_CPD_INST_OPERANDS) --noobaa_account_secret=${NOOBAA_ACCOUNT_CREDENTIALS_SECRET} --noobaa_cert_secret=${NOOBAA_ACCOUNT_CERTIFICATE_SECRET}
          oc get secrets --namespace=$(params.PROJECT_CPD_INST_OPERANDS) noobaa-account-watson-assistant noobaa-cert-watson-assistant noobaa-uri-watson-assistant
          echo
          setup-mcg --components=watsonx_orchestrate --cpd_instance_ns=$(params.PROJECT_CPD_INST_OPERANDS) --noobaa_account_secret=${NOOBAA_ACCOUNT_CREDENTIALS_SECRET} --noobaa_cert_secret=${NOOBAA_ACCOUNT_CERTIFICATE_SECRET}
          oc get secrets --namespace=$(params.PROJECT_CPD_INST_OPERANDS) noobaa-account-watsonx-orchestrate noobaa-cert-watsonx-orchestrate noobaa-uri-watsonx-orchestrate
        fi
    - name: CP-INSTALL-OPTIONS
      value: cpd-install-pipeline-install-option
    - name: PRIVATE_REGISTRY_SECRET
      value: private-registry-secret
    runAfter:
    - authorize-inst-topology
    taskRef:
      kind: Task
      name: olm-utils
    when:
    - input: $(tasks.check-prereq.results.mcg)
      operator: in
      values:
      - 'true'
    - input: $(params.INSTALL_PREREQUISITE)
      operator: in
      values:
      - 'true'
  - name: knative-ibm-events-operator
    retries: 3
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: OLM_CMD
      value: |
        echo 
        echo "> Check if ibm-events-operator is already installed" 
          if oc get kafkas.ibmevents.ibm.com wo-wa-data-governor-kafka -n $(params.PROJECT_CPD_INST_OPERANDS) &>/dev/null; then 
          echo "> ibm-events-operator is already deployed"
        else
          {{- if semverCompare ">5.3.0" .Values.cpd_version }}
          echo "> CASE DOWNLOAD ibm_events_operator"
          if $(params.CASE_FROM_OCI); then
            case-download --release=$(params.VERSION) --components=ibm_events_operator --from_oci=$(params.CASE_FROM_OCI) {{ if .Values.airgap.enabled }}--oci_location=$(params.OCI_LOCATION){{ end }}
          else
            case-download --release=$(params.VERSION) --components=ibm_events_operator
          fi
          echo
          echo "> deploy-events-operator"
          deploy-events-operator --release=$(params.VERSION) --cluster_resources=true
          echo
          echo "apply ibm-events-operator-crds.yaml"
          oc apply -f /tmp/work/ibm-events-operator-crds.yaml --server-side --force-conflicts
          {{- end }}
          if oc get deployment ibm-events-cluster-operator -n ibm-knative-events &>/dev/null; then 
            echo "> ibm-knative-events is already installed, skipping operator installation"
          else
            echo
            echo "knative-setup"
            echo
            deploy-knative-eventing --release=$(params.VERSION) --block_storage_class=$(params.STG_CLASS_BLOCK)
          fi
        
          {{- if semverCompare ">5.3.0" .Values.cpd_version }}
          echo "> Waiting for namespaces $(params.PROJECT_CPD_INST_OPERATORS) and $(params.PROJECT_CPD_INST_OPERANDS) to be created"
          until oc get namespace $(params.PROJECT_CPD_INST_OPERATORS) &>/dev/null && oc get namespace $(params.PROJECT_CPD_INST_OPERANDS) &>/dev/null; do
            echo -n "."
            sleep 2
          done
          echo
          echo "> Namespaces $(params.PROJECT_CPD_INST_OPERATORS) and $(params.PROJECT_CPD_INST_OPERANDS) are present"
          echo
          echo "> Deploying ibm-events-operator"
            deploy-events-operator --release=$(params.VERSION) --events_operator_ns=$(params.PROJECT_CPD_INST_OPERATORS) --events_operand_ns=$(params.PROJECT_CPD_INST_OPERANDS)
          {{- end }}
        fi
    - name: CP-INSTALL-OPTIONS
      value: cpd-install-pipeline-install-option
    - name: PRIVATE_REGISTRY_SECRET
      value: private-registry-secret
    runAfter:
    - wait-for-mcp
    taskRef:
      kind: Task
      name: olm-utils
    when:
    - input: $(tasks.check-prereq.results.ibm-events-operator)
      operator: in
      values:
      - 'true'
    - input: $(params.INSTALL_PREREQUISITE)
      operator: in
      values:
      - 'true'
  - name: cert-manager
    retries: 3
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: OLM_CMD
      value: |
        echo "> Deploy Redhat Cert-Manager Operator"
        cat <<EOF |oc apply -f -
        apiVersion: v1
        kind: Namespace 
        metadata:
          name: cert-manager-operator
        ---
        apiVersion: operators.coreos.com/v1
        kind: OperatorGroup
        metadata:
          name: cert-manager-operator
          namespace: cert-manager-operator
        ---
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: openshift-cert-manager-operator
          namespace: cert-manager-operator
        spec:
            channel: stable-v1
            installPlanApproval: Automatic
            name: openshift-cert-manager-operator
            source: redhat-operators
            sourceNamespace: openshift-marketplace
        EOF

        echo 
        echo "> Wait for CSV for cert-manager to be Available ..." 
        until oc get csv -n cert-manager-operator 2>/dev/null | grep -q cert-manager-operator; do 
          echo -n "."
          sleep 2 
        done 
        echo 
        echo "> Wait for InstallPan to Complete"
        oc wait --for jsonpath='{.status.phase}'="Complete" installplans.operators.coreos.com --all -n cert-manager-operator
        echo "> Wait for Operator Pods to be Ready" 
        oc wait --for=condition=Ready=true pod --all -n cert-manager-operator
        echo "> Wait for cert-manager Pods to be Ready"
        sleep 5
        oc wait --for=condition=Ready=true pod --all -n cert-manager
    - name: CP-INSTALL-OPTIONS
      value: cpd-install-pipeline-install-option
    - name: PRIVATE_REGISTRY_SECRET
      value: private-registry-secret
    runAfter:
    - wait-for-mcp
    taskRef:
      kind: Task
      name: olm-utils
    when:
    - input: $(tasks.check-prereq.results.cert-manager)
      operator: in
      values:
      - 'true'
    - input: $(params.INSTALL_PREREQUISITE)
      operator: in
      values:
      - 'true'


  - name: apply-cluster-components
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{ .Values.arch }}{{- end }}
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    - name: OLM_CMD
      value: |-
        echo
        echo "> Checking if ibm-licensing is installed"
        if oc get ibmlicensings.operator.ibm.com instance -n ibm-licensing &> /dev/null; then
          echo "IBM licensing Operator already installed, skipping operator installation"
        else
          echo "> Installing ibm-licensing"
          apply-cluster-components \
          --release=$(params.VERSION) \
          --license_acceptance=$(params.ACCEPT_LICENCE) \
          --licensing_ns=$(params.PROJECT_LICENSE_SERVICE) \
          --case_download=true \
          --from_oci=$(params.CASE_FROM_OCI) {{ if .Values.airgap.enabled }}\
          --oci_location=$(params.OCI_LOCATION) {{- end }}
        fi
    runAfter:
    - cert-manager  
    taskRef:
      kind: Task
      name: olm-utils
    timeout: 1h0m0s
  - name: apply-scheduler
    params:
      - name: OLM_UTILS_IMAGE
        value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
      - name: CP-INSTALL-OPTIONS
        value: $(params.CP-INSTALL-OPTIONS)
      - name: OLM_CMD
        value: |
          echo
          echo "> Check if IBM scheduler Operator is already installed"
          if [ $(oc get scheduling.scheduler.spectrumcomputing.ibm.com ibm-cpd-scheduler -n ibm-scheduler -o jsonpath='{.status.cpd-schedulingStatus}') = "Completed" ]; then 
            echo "> IBM scheduler Operator already installed, skipping operator installation" 
          else
            echo "CASE_DOWNLOAD"
            case-download \
            --components=scheduler \
            --release=$(params.VERSION) \
            --from_oci=$(params.CASE_FROM_OCI) \
            --oci_location={{ if .Values.airgap.enabled }}$(params.OCI_LOCATION){{ else }}cp.icr.io/cpopen{{ end }} \
            --scheduler_ns=$(params.PROJECT_SCHEDULING_SERVICE) \
            --cluster_resources=true
            [ $? -ne 0 ] && exit 1
            echo 
            echo "APPLY_CLUSTERSCOPED_RESOURCES" 
            oc apply -f /tmp/work/cluster_scoped_resources.yaml --server-side --force-conflicts 
            [ $? -ne 0 ] && exit 1 
            echo 
            echo "INSTALL_SCEDULER"
            apply-scheduler --license_acceptance=true --release=$(params.VERSION) --scheduler_ns=$(params.PROJECT_SCHEDULING_SERVICE) {{ if .Values.airgap.enabled }}--image_pull_prefix=$(params.IMAGE_PULL_PREFIX){{- end }}
          fi
    runAfter:
    - cert-manager
    taskRef:
      kind: Task
      name: olm-utils
    when:
    - input: $(params.SCHEDULER)
      operator: in
      values:
      - "true"
      - "yes"
  - name: authorize-inst-topology
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    - name: OLM_CMD
      value: |-
        authorize-instance-topology \
        --cpd_operator_ns=$(params.PROJECT_CPD_INST_OPERATORS) \
        --cpd_instance_ns=$(params.PROJECT_CPD_INST_OPERANDS)
    runAfter:
    - cert-manager
    taskRef:
      kind: Task
      name: olm-utils
  - name: set-db2-limited-privs
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    - name: OLM_CMD
      value: |-
        oc apply -f - <<EOF
        apiVersion: v1
        data:
          DB2U_RUN_WITH_LIMITED_PRIVS: "true"
        kind: ConfigMap
        metadata:
          name: db2u-product-cm
          namespace: $(params.PROJECT_CPD_INST_OPERATORS)
        EOF
    runAfter:
    - authorize-inst-topology
    taskRef:
      kind: Task
      name: olm-utils
    when:
    - input: $(params.DB2_LIMITED_PRIV)
      operator: in
      values:
      - "true"
      - "yes"
  - name: image-pull-secret
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    - name: OLM_CMD
      value: |-
        {{- if .Values.airgap.enabled }}
        cp /opt/ansible/.airgap/secrets/config.json ./dockerconfig.json
        {{- else }}
        echo "extract icr.io creds from global pull secret"
        oc extract secret/pull-secret -n openshift-config --to - | jq '{"auths":{"cp.icr.io": .auths["cp.icr.io"],"icr.io": .auths["cp.icr.io"]}}' > dockerconfig.json
        {{- end }}

        NAMESPACES="$(params.PROJECT_CPD_INST_OPERATORS) $(params.PROJECT_CPD_INST_OPERANDS)"
        if $(params.SCHEDULER); then
          NAMESPACES="$NAMESPACES $(params.PROJECT_SCHEDULING_SERVICE)"
        fi
        for ns in $NAMESPACES; do
          if oc get secret ibm-entitlement-key -n ${ns} > /dev/null; then
            echo "ibm-entitlement-key already present in ns $ns"
          else
            oc create secret generic ibm-entitlement-key \
            --from-file=.dockerconfigjson=dockerconfig.json \
            --namespace=${ns}
          fi
        done
    runAfter:
    - authorize-inst-topology
    - apply-scheduler
    taskRef:
      kind: Task
      name: olm-utils
  - name: apply-entitlement
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{ .Values.arch }}{{- end }}
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    - name: OLM_CMD
      value: |-
        for cmp in $(echo $(params.ENTITLEMENT) | tr , " "); do
          apply-entitlement \
          --cpd_instance_ns=$(params.PROJECT_CPD_INST_OPERANDS) \
          --entitlement=$cmp --production=$(params.PRODUCTION)
        done
    runAfter:
    - apply-cluster-components
    timeout: "1h0m0s"
    taskRef:
      kind: Task
      name: olm-utils
  - name: cpd-install
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{  .Values.arch }}{{- end }}
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    - name: OLM_CMD
      value: |
            echo "CASE_DOWNLOAD"
            case-download \
            --components=cpd_platform,$(params.COMPONENTS) \
            --release=$(params.VERSION) \
            --from_oci=$(params.CASE_FROM_OCI) \
            --oci_location={{ if .Values.airgap.enabled }}$(params.OCI_LOCATION){{ else }}cp.icr.io/cpopen{{ end }} \
            --operator_ns=$(params.PROJECT_CPD_INST_OPERATORS) \
            --cluster_resources=true
            [ $? -ne 0 ] && exit 1
            echo 
            echo "APPLY_CLUSTERSCOPED_RESOURCES"
            oc apply -f /tmp/work/cluster_scoped_resources.yaml --server-side --force-conflicts
            [ $? -ne 0 ] && exit 1
            echo
            echo "INSTALL_COMPONENT"
            install-components \
            --license_acceptance=$(params.ACCEPT_LICENCE) \
            --components=cpd_platform,$(params.COMPONENTS) \
            --release=$(params.VERSION) \
            --operator_ns=$(params.PROJECT_CPD_INST_OPERATORS) \
            --instance_ns=$(params.PROJECT_CPD_INST_OPERANDS) \
            --block_storage_class=$(params.STG_CLASS_BLOCK) \
            --file_storage_class=$(params.STG_CLASS_FILE){{- if .Values.airgap.enabled }} \
            --image_pull_prefix=$(params.IMAGE_PULL_PREFIX){{- end }} \
            --param-file=/tmp/install-options/install-options.yml
    runAfter:
    - openshift-ai
    - setup-mcg
    - set-db2-limited-privs
    - image-pull-secret
    - apply-entitlement
    - knative-ibm-events-operator
    timeout: "8h0m0s"
    taskRef:
      kind: Task
      name: olm-utils
  - name: instance-details
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{ .Values.arch }}{{- end }}
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    - name: OLM_CMD
      value: |-
        get-cpd-instance-details \
        --cpd_instance_ns=$(params.PROJECT_CPD_INST_OPERANDS) \
        --get_admin_initial_credentials=true
    runAfter:
    - cpd-install
    taskRef:
      kind: Task
      name: olm-utils
  - name: get-cr-status
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{ .Values.arch }}{{- end }}
    - name: OLM_CMD
      value: |-
        get-cr-status \
        --cpd_instance_ns=$(params.PROJECT_CPD_INST_OPERANDS)
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    runAfter:
    - cpd-install
    taskRef:
      kind: Task
      name: olm-utils
  - name: list-deployed-components
    params:
    - name: OLM_UTILS_IMAGE
      value: $(params.OLM_UTILS_IMAGE):$(params.VERSION){{- if ne .Values.arch "x86" -}} .{{ .Values.arch }}{{- end }}
    - name: OLM_CMD
      value: |-
        list-deployed-components --cpd_instance_ns=$(params.PROJECT_CPD_INST_OPERANDS)
    - name: CP-INSTALL-OPTIONS
      value: $(params.CP-INSTALL-OPTIONS)
    runAfter:
    - cpd-install
    taskRef:
      kind: Task
      name: olm-utils
{{- end -}}